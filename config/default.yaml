agent:
  id: "ada-agent-local"
  mode: "foreground"
  setupOnFirstRun: true

bootstrapUI:
  enabled: true
  mode: "auto" # auto | cli | gui
  host: "127.0.0.1"
  port: 17650
  autoOpenBrowser: true
  sessionTtlSec: 600
  secretsProvider: "auto" # auto | keychain | credman | file
  native:
    enabled: false
    command: "" # e.g. ./bootstrap-ui / .\bootstrap-ui.exe
    args: []
    timeoutMs: 120000
    fallbackToWeb: true

transport:
  mode: "auto"
  streamProtocol: "websocket"
  requestPath: "/api/v1/execute"
  healthPath: "/health"
  streamPath: "/ws"
  requestTimeoutMs: 15000

graphics:
  enabled: false
  fallbackOnSemanticFailure: false
  minConfidence: 0.8

viewControl:
  enabled: true
  defaultControlMode: semantic
  snapshot:
    maxNodes: 500
    includeScreenshot: true
    cacheTtlMs: 3000
  visual:
    adapter: noop
    requireRiskApproved: true
  registry:
    maxViewsPerSession: 200

# MCP 工具返回体（Host / 大模型可见）
mcp:
  # false（默认）= 精简 result，省 token；true = 完整 CommandResult，便于人工调试
  verboseResult: false
  # extract 是否附带 rawResult（也可用 ADA_MCP_EXTRACT_RAW=1）
  extractRaw: false
  # JSON 是否 pretty-print（也可用 ADA_MCP_JSON_PRETTY=1）
  jsonPretty: false

monitoring:
  enabled: false
  platforms: ["web"] # 可选子集；启用 Android/iOS/Harmony 时追加对应平台（doctor 与运行时检查据此判定）
  sampleEvery: 1 # 每 N 条操作采样一次，1 表示全量
  outputDir: "artifacts/monitoring"
  onFailureOnly: false # true 时仅失败操作抓图，性能更优
  groupBySession: true # 按 sessionId/requestId 分层归档
  nonBlocking: true # true 时监控异步执行，不阻塞主链路
  resolution:
    maxWidth: 1280
    maxHeight: 720
    keepAspectRatio: true # 保持比例，避免监控图像变形

# 移动设备：引导/启动后自动 adb/hdc/xcrun 扫描并写入 .ada-agent/devices.json
devices:
  autoScanOnSetup: true
  autoScanOnStart: true

queue:
  inboxDir: "tasks/inbox"
  processedDir: "tasks/processed"
  failedDir: "tasks/failed"
  pollIntervalMs: 3000
  maxFileRetryAttempts: 2

# Web / Playwright 默认：有头、窗口置前（测试/调试可见）；CI 可设 ADA_PLAYWRIGHT_HEADLESS=true
playwright:
  headless: false
  bringToFront: true

dependencies:
  autoInstallOnStart: true
  playwrightBrowser: "chromium" # chromium | firefox | webkit | all
  playwrightInstallTargets: ["chromium"] # chromium | chrome | msedge | firefox | webkit | all
  playwrightDownloadHost: "https://cdn.playwright.dev"
  # 国内 npm 镜像（按优先级；install-deps 启动时测速选最快，无需用户配置）
  npmRegistryCandidates:
    - "https://registry.npmjs.org" # 官方
    - "https://registry.npmmirror.com" # 阿里云 / npmmirror
    - "https://mirrors.cloud.tencent.com/npm" # 腾讯云
    - "https://mirrors.sjtug.sjtu.edu.cn/npm-registry" # 上海交大
    - "https://npmreg.proxy.ustclug.org" # 中科大
    - "https://repo.huaweicloud.com/repository/npm" # 华为云
  # 浏览器 zip CDN（按序测速，吞吐最高优先；同速时官方靠前）
  playwrightHostCandidates:
    - "https://cdn.playwright.dev"
    - "https://playwright.azureedge.net"
    - "https://cdn.npmmirror.com/binaries/playwright"
    - "https://npmmirror.com/mirrors/playwright"
  # 纯血鸿蒙工具（hdc 等），相对工作区根目录；也可用环境变量 ADA_TOOLS_DIR 覆盖
  toolsDir: "tools"
  # install-deps --only=harmony / --only=all 时自动下载 hdc（支持 .zip 或直链；GitHub blob 链接会自动转 raw）
  harmonyHdcDownloadUrls:
    - "https://raw.githubusercontent.com/osgm/ada/main/tools/hdc.exe"

# 可选：命名 app profile（E2E / MCP 通过 ADA_APP_PROFILE 引用；勿在此内置业务 App）
# appProfiles:
#   example:
#     harmony:
#       appId: "com.example.app"
#       abilityId: "EntryAbility"
#     android:
#       appId: "com.example.app"

# 旧移动驱动配置段已弃用（driver-android / driver-ios / driver-harmony 直连通道）
